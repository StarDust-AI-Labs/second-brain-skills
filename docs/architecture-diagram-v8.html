<body>

  <svg viewBox="0 0 1160 1080" xmlns="http://www.w3.org/2000/svg">

           Palette: Low-saturation system accents
           Elevation: 4 levels (e1=elevation-1 ... e4=elevation-4)
           Spacing: 8px grid (8, 16, 24, 32, 48, 64)

      <!-- === ELEVATION SHADOWS (Dimensional Layering pattern) === -->
      <filter id="e1" x="-4%" y="-4%" width="108%" height="112%">
        <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1d1d1f" flood-opacity="0.08"/>

    <!-- L2→L3 -->
    <line x1="580" y1="348" x2="580" y2="376" stroke="#af52de" stroke-opacity="0.22" stroke-width="1.2" stroke-dasharray="3,6"/>
