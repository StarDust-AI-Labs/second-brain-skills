<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>

  .diagram-header { text-align: center; margin-bottom: 56px; }
  .diagram-title {
    color: #fafafa; font-size: 32px; font-weight: 700; letter-spacing: 3px;
    text-shadow: 0 0 80px rgba(124,58,237,0.15);
  }
  .diagram-subtitle {
    color: #52525b; font-size: 11px; margin-top: 10px;
    letter-spacing: 8px; font-weight: 500; text-transform: uppercase;
  }
  .diagram-accent-line {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, #7c3aed40, #0891b240, transparent);
    margin: 18px auto 0; border-radius: 1px;
  }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="diagram-container">

  <svg viewBox="0 0 1160 1140" xmlns="http://www.w3.org/2000/svg">

    <defs>
      <!-- ============================================================ -->
      <!-- DESIGN TOKENS (from ui-ux-pro-max data)
           Style: Dark Mode OLED + Glassmorphism + Dimensional Layering
           Palette: Custom warm-tech blend
           Elevation: 4 levels (e1=elevation-1 ... e4=elevation-4)
           Spacing: 8px grid (8, 16, 24, 32, 48, 64)
           Radius: 6(sm) 10(md) 14(lg) 20(xl)
           Typography: Inter + Noto Sans SC, 10-32px scale
      ============================================================ -->

      <!-- === ELEVATION SHADOWS (Dimensional Layering pattern) === -->
      <filter id="e1" x="-4%" y="-4%" width="108%" height="112%">
        <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.30"/>
      </filter>
      <filter id="e2" x="-6%" y="-6%" width="112%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.40"/>
      </filter>
      <filter id="e3" x="-8%" y="-8%" width="116%" height="124%">
        <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.50"/>
      </filter>
      <filter id="e4" x="-10%" y="-10%" width="120%" height="132%">
        <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#000" flood-opacity="0.60"/>
      </filter>

      <!-- === GLASSMORPHISM BLUR (subtle, for accent cards) === -->
      <filter id="glass-blur">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>

      <!-- === NOISE TEXTURE (film grain, refined) === -->
      <filter id="grain" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" result="n"/>
        <feColorMatrix type="saturate" values="0" in="n" result="gn"/>
        <feComponentTransfer in="gn"><feFuncA type="linear" slope="0.028"/></feComponentTransfer>
      </filter>

      <!-- ============================================================ -->

           Input   — Slate Blue     #94a3b8
           Agent   — Violet         #8b8ab8
           Method  — Warm Sand      #b8a890
           Tool    — Sage           #8aaa90
           Storage — Dusty Rose     #b89090
      ============================================================ -->

      <linearGradient id="bg-input" x1="0%" y1="0%" x2="100%" y2="100%">

        <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0.02"/>
      </linearGradient>

        <path d="M0 0 L5 8 L10 0" fill="#94a3b8" fill-opacity="0.45"/>
      </marker>
      <marker id="arr-agent" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M0 0 L5 8 L10 0" fill="#8b8ab8" fill-opacity="0.45"/>

      <circle cx="692" cy="114" r="14" fill="#8b8ab8" fill-opacity="0.06" stroke="#8b8ab8" stroke-opacity="0.16" stroke-width="0.8"/>

    <!-- L2→L3 -->
    <line x1="580" y1="368" x2="580" y2="416" stroke="#8b8ab8" stroke-opacity="0.22" stroke-width="1.2" stroke-dasharray="3,6"/>

      <rect x="48" y="0" width="112" height="32" rx="12" fill="url(#tag-method)"/>
